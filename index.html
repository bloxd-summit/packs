<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Revia t-pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: url('https://iili.io/3EpShyN.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 30px;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      width: 75%;
      margin: auto;
    }

    /* 🔥 이미지 카드 */
    .card {
      position: relative;
      display: block;
      aspect-ratio: 16 / 10; /* 🔥 여기만 수정 */
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      cursor: pointer;
      transition: 0.25s;
    }

    /* 이미지 */
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 어둡게 */
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    /* 텍스트 */
    .title {
      position: absolute;
      bottom: 10px;
      left: 15px;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 10px black;
      z-index: 1;
    }

    .card:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

<div class="overlay">

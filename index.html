<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Revia t-pack</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      font-size: 40px;
      margin: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 60%;
      margin: auto;
    }

    .card {
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
    }
  </style>
</head>
<body>

<h1>Revia t-pack</h1>

<div class="grid">
  <div class="card">
    <div>텍팩1</div>
    <a href="파일링크.zip">다운로드</a>
  </div>

  <div class="card">
    <div>텍팩2</div>
    <a href="파일링크2.zip">다운로드</a>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Revia t-pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: url('https://iili.io/3EpShyN.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 30px;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      width: 80%;
      margin: auto;
    }

    /* 🔥 카드 스타일 (완성형) */
    .card {
      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);

      text-decoration: none;
      color: white;
      cursor: pointer;

      height: 100px;
      font-size: 22px;
      font-weight: bold;

      transition: 0.25s;
    }

    .card:hover {
      transform: scale(1.07);
      background: rgba(255,255,255,0.18);
    }
  </style>
</head>

<body>

<div class="overlay">

  <h1>Revia t-pack</h1>

  <div class="grid">

    <!-- ✅ 텍팩 1 -->
    <a href="https://raw.githubusercontent.com/bloxd-Revia/packs/main/starLike.zip" download class="card">
      starLike
    </a>

    <!-- ✅ 텍팩 2 -->
    <a href="#" class="card">
      텍팩 추가 예정
    </a>

    <!-- ✅ 텍팩 3 -->
    <a href="#" class="card">
      텍팩 추가 예정
    </a>

  </div>

</div>

</body>
</html>

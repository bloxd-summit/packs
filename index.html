<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Revia t-pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;

      /* 🔥 배경 이미지 */
      background: url('https://iili.io/3EpShyN.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    /* 어둡게 덮는 효과 */
    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 30px;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 80%;
      margin: auto;
    }

    /* 카드 스타일 */
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    a {
      display: inline-block;
      margin-top: 10px;
      color: #00ffe5;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="overlay">

  <h1>Revia t-pack</h1>

  <div class="grid">

    <div class="card">
      <div>starLike</div>
      <a href="https://github.com/bloxd-Revia/packs/blob/ef793cb54225bbcfc480936f0f2d249669a61c1f/starLike.zip">Download</a>
    </div>

    <div class="card">
      <div>텍팩2</div>
      <a href="#">Download</a>
    </div>

    <div class="card">
      <div>텍팩3</div>
      <a href="#">Download</a>
    </div>

  </div>

</div>

</body>
</html>

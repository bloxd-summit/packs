<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Revia t-pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: url('https://iili.io/3EpShyN.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 30px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    /* 🔥 링크 줄 (간격 핵심) */
    .links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px; /* 👈 간격 여기서 조절 */
      margin-bottom: 40px;
      font-size: 18px;
    }

    .links a {
      text-decoration: none;
      font-weight: bold;
    }

    /* 구분선 */
    .divider {
      opacity: 0.5;
    }

    /* 🔥 디스코드 */
    .Discord {
      color: #5865F2;
    }

    /* 🔥 유튜브 */
    .YuTube .You {
      color: red;
    }
    .YouTube .Tube {
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      width: 75%;
      margin: auto;
    }

    .card {
      position: relative;
      display: block;
      aspect-ratio: 16 / 10;
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      cursor: pointer;
      transition: 0.25s;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .title {
      position: absolute;
      bottom: 10px;
      left: 15px;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 10px black;
      z-index: 1;
    }

    .card:hover {
      transform: scale(1.03);
    }
  </style>
</head>

      <span class="You">You</span><span class="Tube">Tube</span>

  </div>

  <div class="grid">

</html>
